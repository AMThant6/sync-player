<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sync Party Player</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root { --mx-red: #e50914; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* Setup Screen */
        #setupUI { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #121212; position: relative; z-index: 100; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 15px; text-align: center; width: 85%; max-width: 350px; }
        button { background: var(--mx-red); color: #fff; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; margin: 5px; }
        input { background: #2c2c2c; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 8px; width: 120px; text-align: center; margin-bottom: 10px; }

        /* Player Container */
        #playerContainer { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; }
        video { width: 100%; height: 100%; object-fit: contain; }
        video.cover { object-fit: cover; }

        /* UI Overlay */
        #mainOverlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: space-between;
            background: rgba(0,0,0,0.4); transition: opacity 0.4s ease; z-index: 10;
        }
        
        /* Top Bar */
        .top-bar { padding: 15px; display: flex; justify-content: space-between; align-items: flex-start; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
        .top-center { display: flex; gap: 10px; position: absolute; left: 50%; transform: translateX(-50%); top: 15px; }
        .watcher-count { font-size: 10px; letter-spacing: 1px; color: #aaa; text-align: right; }

        /* Center Controls */
        .center-ui { display: flex; align-items: center; justify-content: center; gap: 30px; flex-grow: 1; }
        .control-btn { 
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%; width: 70px; height: 70px; 
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 13px; font-weight: bold;
        }

        /* Bottom Bar */
        .bottom-ui { padding: 20px; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); }
        .seek-bar-container { width: 100%; height: 20px; display: flex; align-items: center; cursor: pointer; margin-bottom: 5px; }
        .seek-bar-rail { width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; position: relative; }
        #progress { height: 100%; background: var(--mx-red); width: 0%; border-radius: 2px; }

        .time-row { display: flex; justify-content: space-between; }
        .time-display { font-size: 12px; font-family: monospace; color: #ccc; }
        
        .nav-btn { background: rgba(0,0,0,0.6); border: 1px solid #666; color: #fff; padding: 8px 14px; font-size: 10px; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-weight: bold; }

        #toast { 
            position: absolute; top: 25%; left: 50%; transform: translateX(-50%); 
            background: var(--mx-red); color: #fff; padding: 6px 15px; 
            border-radius: 4px; font-size: 11px; font-weight: bold; opacity: 0; transition: 0.3s; pointer-events: none; 
        }
    </style>
</head>
<body>

<div id="setupUI">
    <div class="card">
        <h2 style="color:var(--mx-red); margin-bottom: 20px;">SYNC PLAYER</h2>
        <div id="status" style="font-size: 11px; margin-bottom: 15px; color: #666;">READY TO CONNECT</div>
        <button onclick="startSession('create')">CREATE PARTY</button>
        <div style="margin: 10px 0;">
            <input type="text" id="roomInput" placeholder="CODE">
            <button onclick="startSession('join')">JOIN</button>
        </div>
        <input type="file" id="fileIn" accept="video/*" style="display:none" onchange="handleFile(this)">
        <button id="fileBtn" style="display:none; width: 100%; background:#333" onclick="document.getElementById('fileIn').click()">SELECT VIDEO</button>
    </div>
</div>

<div id="playerContainer">
    <video id="mainVideo" playsinline></video>
    
    <div id="mainOverlay">
        <div class="top-bar">
            <div><b id="roomNameDisplay" style="color:var(--mx-red)">ROOM</b></div>
            <div class="top-center">
                <button class="nav-btn" onclick="toggleFit(event)">FIT / FILL</button>
                <button id="fsBtn" class="nav-btn">FULLSCREEN</button>
            </div>
            <div id="watcherCount" class="watcher-count">WATCHERS: 1</div>
        </div>

        <div class="center-ui">
            <div class="control-btn" onclick="seekRelative(-10)">-10s</div>
            <div class="control-btn" id="playBtn" onclick="togglePlay()" style="width:85px; height:85px; background: var(--mx-red); border:none;">PLAY</div>
            <div class="control-btn" onclick="seekRelative(10)">+10s</div>
        </div>

        <div class="bottom-ui">
            <div class="seek-bar-container" id="seekContainer">
                <div class="seek-bar-rail">
                    <div id="progress"></div>
                </div>
            </div>
            <div class="time-row">
                <span id="curTime" class="time-display">00:00</span>
                <span id="totalTime" class="time-display">00:00</span>
            </div>
        </div>
    </div>
    <div id="toast"></div>
</div>

<script>
    let mqttClient, roomCode, clientId = "u" + Math.random().toString(16).slice(2,6);
    let participants = {}; // Stores { clientId: lastSeenTimestamp }
    const v = document.getElementById('mainVideo');
    const overlay = document.getElementById('mainOverlay');
    const container = document.getElementById('playerContainer');
    let uiTimer;

    function startSession(type) {
        roomCode = type === 'create' ? Math.random().toString(36).slice(2,6).toUpperCase() : document.getElementById('roomInput').value.toUpperCase();
        if(!roomCode) return;

        mqttClient = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        mqttClient.on('connect', () => {
            mqttClient.subscribe(roomCode);
            mqttClient.subscribe(roomCode + "/presence");
            
            // Initial Join
            mqttClient.publish(roomCode + "/presence", JSON.stringify({type:'ping', id: clientId}));
            
            document.getElementById('status').innerText = "CONNECTED TO " + roomCode;
            document.getElementById('fileBtn').style.display = "block";
            document.getElementById('roomNameDisplay').innerText = roomCode;
            
            // Start Heartbeat: Ping every 10 seconds
            setInterval(() => {
                if(mqttClient) mqttClient.publish(roomCode + "/presence", JSON.stringify({type:'ping', id: clientId}));
            }, 10000);

            // Start Cleanup: Check for dead users every 5 seconds
            setInterval(cleanupParticipants, 5000);
        });

        mqttClient.on('message', (topic, msg) => {
            let data = JSON.parse(msg.toString());
            if(data.id === clientId) return;

            if(topic.endsWith("/presence")) {
                if (data.type === 'ping') {
                    if (!participants[data.id]) showToast("USER JOINED");
                    participants[data.id] = Date.now();
                } else if (data.type === 'leave') {
                    delete participants[data.id];
                    showToast("USER LEFT");
                }
                updateWatcherUI();
                return;
            }

            if(data.type === 'sync') {
                if(Math.abs(v.currentTime - data.time) > 0.5) v.currentTime = data.time;
                data.state === 'play' ? v.play() : v.pause();
            }
        });
    }

    function cleanupParticipants() {
        const now = Date.now();
        let changed = false;
        for (let id in participants) {
            // If we haven't heard from them in 15 seconds, remove them
            if (now - participants[id] > 15000) {
                delete participants[id];
                changed = true;
            }
        }
        if (changed) updateWatcherUI();
    }

    function updateWatcherUI() {
        // Count ourselves (1) + everyone in the participants object
        const count = 1 + Object.keys(participants).length;
        document.getElementById('watcherCount').innerText = "WATCHERS: " + count;
    }

    function handleFile(input) {
        if(!input.files[0]) return;
        v.src = URL.createObjectURL(input.files[0]);
        document.getElementById('setupUI').style.display = 'none';
        container.style.display = 'block';
        resetUITimer();
    }

    function sync(state) {
        if(!mqttClient) return;
        mqttClient.publish(roomCode, JSON.stringify({id: clientId, type: 'sync', state: state, time: v.currentTime}));
    }

    function togglePlay() {
        if(v.paused) { v.play(); sync('play'); } 
        else { v.pause(); sync('pause'); }
    }

    v.onplay = () => { document.getElementById('playBtn').innerText = "PAUSE"; resetUITimer(); };
    v.onpause = () => { document.getElementById('playBtn').innerText = "PLAY"; resetUITimer(); };

    function seekRelative(sec) { v.currentTime += sec; sync(v.paused ? 'pause' : 'play'); }

    document.getElementById('seekContainer').onclick = function(e) {
        let rect = this.getBoundingClientRect();
        v.currentTime = ((e.clientX - rect.left) / rect.width) * v.duration;
        sync(v.paused ? 'pause' : 'play');
    };

    v.ontimeupdate = () => {
        document.getElementById('progress').style.width = (v.currentTime / v.duration) * 100 + "%";
        document.getElementById('curTime').innerText = formatTime(v.currentTime);
        document.getElementById('totalTime').innerText = formatTime(v.duration);
    };

    function formatTime(s) { return new Date(s * 1000).toISOString().substr(14, 5); }

    document.getElementById('fsBtn').addEventListener('click', function(e) {
        e.stopPropagation();
        if (!document.fullscreenElement) {
            if (container.requestFullscreen) container.requestFullscreen();
            else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
        }
    });

    function resetUITimer() {
        overlay.style.opacity = "1";
        overlay.style.pointerEvents = "auto";
        clearTimeout(uiTimer);
        if(!v.paused) {
            uiTimer = setTimeout(() => {
                overlay.style.opacity = "0";
                overlay.style.pointerEvents = "none";
            }, 2000);
        }
    }

    container.addEventListener('touchstart', resetUITimer);
    container.addEventListener('mousemove', resetUITimer);
    overlay.addEventListener('click', (e) => { e.stopPropagation(); resetUITimer(); });

    function toggleFit(e) { e.stopPropagation(); v.classList.toggle('cover'); }
    
    function showToast(m) {
        let t = document.getElementById('toast');
        t.innerText = m; t.style.opacity = 1;
        setTimeout(() => t.style.opacity = 0, 2000);
    }

    // Send graceful leave on close
    window.onbeforeunload = function() {
        if (mqttClient && roomCode) {
            mqttClient.publish(roomCode + "/presence", JSON.stringify({type:'leave', id: clientId}));
        }
    };
</script>
</body>
</html>
